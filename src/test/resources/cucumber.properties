# Use Guice for dependency injection in Cucumber step definitions.
# This lets TinkerPop's StepDefinition receive our TinkerPopWorld via constructor injection.
cucumber.objectfactory=io.cucumber.guice.GuiceFactory

# Tell cucumber-guice which InjectorSource to use for building the Guice injector.
# TinkerPopGuiceFactory binds World -> TinkerPopWorld and sets up the scenario scope.
guice.injector-source=com.graphqueryengine.gremlin.tinkerpop.TinkerPopGuiceFactory
