# ──────────────────────────────────────────────────────────────────────────────
# Graph Query Engine — runtime configuration
# ──────────────────────────────────────────────────────────────────────────────

# ── SQL translation layer (H2 file-based, persistent) ─────────────────────────
# Override with environment variables: DB_URL, DB_USER, DB_PASSWORD, DB_DRIVER
# Default: jdbc:h2:file:./data/graph;AUTO_SERVER=TRUE  (set in DatabaseConfig.java)
# Use jdbc:h2:mem:graph;DB_CLOSE_DELAY=-1 for a purely in-memory H2 instead.

# ── Graph store (TinkerGraph, persistent) ─────────────────────────────────────
# Override with environment variable: TINKERGRAPH_LOCATION
# Default: ./data/graph.gryo  (Gryo binary format, loaded on startup, saved after
#          every mutating /gremlin/query call)
# Set TINKERGRAPH_LOCATION="" or delete the file to start with an empty graph.
