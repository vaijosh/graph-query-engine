# ──────────────────────────────────────────────────────────────────────────────
# Graph Query Engine — runtime configuration
# ──────────────────────────────────────────────────────────────────────────────

# ── SQL translation layer (H2 file-based, persistent) ─────────────────────────
# Override with environment variables: DB_URL, DB_USER, DB_PASSWORD, DB_DRIVER
# Default: jdbc:h2:file:./data/graph;AUTO_SERVER=TRUE  (set in DatabaseConfig.java)
# Use jdbc:h2:mem:graph;DB_CLOSE_DELAY=-1 for a purely in-memory H2 instead.

# ── Graph execution backend ───────────────────────────────────────────────────
# GRAPH_PROVIDER is always 'sql' — it is the only supported value.
# WCOJ (Leapfrog Trie Join) is embedded inside the sql provider and enabled by
# default; it intercepts multi-hop path traversals and falls back to SQL for
# aggregations, projections, and tables exceeding WCOJ_MAX_EDGES rows.
# WCOJ tuning env-vars:
#   WCOJ_ENABLED=true|false       Enable/disable WCOJ (default: true)
#   WCOJ_MAX_EDGES=<n>            In-memory edge limit (default: 5000000)
#   WCOJ_DISK_QUOTA_MB=<n>        Per-mapping disk quota in MB (default: 2048)
#   WCOJ_INDEX_TTL_SECONDS=<n>    Index TTL in seconds (default: 30; 0 = disabled)
#                                 Trino/Iceberg backends also get the warehouse
#                                 optimizer session properties applied automatically.
