services:
  minio:
    image: minio/minio:latest
    container_name: iceberg-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      default:
        aliases:
          - warehouse.minio

  minio-init:
    image: minio/mc:latest
    container_name: iceberg-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin --api s3v4 &&
      mc mb --ignore-existing local/warehouse &&
      mc mb --ignore-existing local/aml &&
      exit 0
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      CATALOG_WAREHOUSE: s3://warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH_STYLE_ACCESS: "true"
      JAVA_OPTS: "-Ds3.path-style-access=true"
    ports:
      - "8181:8181"

  trino:
    image: trinodb/trino:471
    container_name: iceberg-trino
    depends_on:
      iceberg-rest:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
