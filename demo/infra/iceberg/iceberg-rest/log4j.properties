#
# Custom log4j.properties for tabulario/iceberg-rest
#
# Mounted at runtime via docker-compose to suppress the noisy
# NoSuchViewException ERROR that Trino triggers on every table lookup:
#   Trino always probes for a view fallback after a table load; the REST
#   catalog legitimately returns 404, but logs it at ERROR level.
#   Downgrading RESTCatalogServlet to WARN keeps the signal-to-noise ratio high.
#

log4j.rootLogger=INFO, stdout

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd'T'HH:mm:ss.SSS} %-5p [%c] - %m%n

# Trino always probes for a view after resolving a table; suppress the resulting
# NoSuchViewException that would otherwise appear as ERROR on every query.
# FATAL means only truly fatal JVM errors show — the harmless 404 view-probe is silenced.
log4j.logger.org.apache.iceberg.rest.RESTCatalogServlet=FATAL

